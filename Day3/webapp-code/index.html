<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Advanced Web App</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background: linear-gradient(to right, #0f0f47, #243b55);
      color:white;
      text-align:center;
      min-height:100vh;
    }

    header{
      padding:20px;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(5px);
    }

    h1{
      font-size:50px;
      margin-top:20px;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow{
      from{
        text-shadow:0 0 10px #00ffff;
      }
      to{
        text-shadow:0 0 25px #00ffff, 0 0 40px #00ffff;
      }
    }

    .container{
      margin-top:60px;
    }

    .card{
      background:white;
      color:black;
      width:320px;
      margin:auto;
      padding:25px;
      border-radius:20px;
      box-shadow:0 8px 20px rgba(0,0,0,0.3);
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.05);
    }

    button{
      margin-top:20px;
      padding:12px 25px;
      border:none;
      border-radius:10px;
      background:#00bcd4;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#008c9e;
      transform:translateY(-3px);
    }

    /* Popup */
    .popup{
      width:350px;
      background:white;
      color:black;
      border-radius:15px;
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%) scale(0);
      text-align:center;
      padding:30px;
      visibility:hidden;
      transition:0.4s;
      z-index:1000;
      box-shadow:0 10px 30px rgba(0,0,0,0.5);
    }

    .popup.open-popup{
      visibility:visible;
      transform:translate(-50%, -50%) scale(1);
    }

    .popup img{
      width:80px;
      margin-top:-70px;
      border-radius:50%;
      box-shadow:0 2px 5px rgba(0,0,0,0.3);
    }

    .popup h2{
      margin:15px 0;
      font-size:28px;
    }

    .overlay{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.6);
      display:none;
      z-index:999;
    }

    .show-overlay{
      display:block;
    }

  </style>
</head>

<body>

  <header>
    <h2>Azure</h2>
  </header>

  <div class="container">
    <h1>GitHub Action to Azure</h1>
    <br>
    <p>Welcome to my stylish Azure deployed website!</p>

    <br><br>

    <div class="card">
      <p>This is a message from Azure</p>

      <button onclick="openPopup()">
        Click Me
      </button>
    </div>
  </div>

  <!-- Overlay -->
  <div class="overlay" id="overlay"></div>

  <!-- Popup -->
  <div class="popup" id="popup">
    <img src="https://cdn-icons-png.flaticon.com/512/190/190411.png">

    <h2>Success!</h2>

    <p>You successfully entered Azure 🎉</p>

    <button onclick="closePopup()">
      Close
    </button>
  </div>


  <script>

    let popup = document.getElementById("popup");
    let overlay = document.getElementById("overlay");

    function openPopup(){
      popup.classList.add("open-popup");
      overlay.classList.add("show-overlay");
    }

    function closePopup(){
      popup.classList.remove("open-popup");
      overlay.classList.remove("show-overlay");
    }

  </script>

</body>
</html>
